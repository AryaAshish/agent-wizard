name: nightly

on:
  schedule:
    - cron: "0 5 * * *"

permissions:
  contents: read

jobs:
  full:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"
          cache: true

      - run: go test ./... -count=10
