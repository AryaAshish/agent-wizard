name: ci

on:
  push:
    branches: ["main"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test-matrix:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.10"
          cache: true

      - run: go test ./...

      - shell: bash
        run: bash scripts/verify_docs.sh

      - shell: bash
        run: bash scripts/check_coverage.sh

  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.10"
          cache: true

      - run: go install golang.org/x/vuln/cmd/govulncheck@v1.1.4

      - run: govulncheck ./...

  perf-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.10"
          cache: true

      - shell: bash
        run: bash scripts/perf_smoke.sh

      - uses: actions/upload-artifact@v4
        with:
          name: perf-smoke
          path: .artifacts/perf-smoke.txt

  distribution-dry-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.10"
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - shell: bash
        run: bash scripts/distribution/smoke.sh
